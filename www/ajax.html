<body>

    <h1>AJAX: demonstrate AJAX - The XMLHttpRequest Object</h1>
    <h2><p id="demo">AJAX response from the server</p></h2> 
    <button type="button" id="toggleBtn" onclick="loadText()">Load Text</button> 
    <p id="emailMsg"></p>
    


    <hr style="border: 2px solid black; width: 100%; margin: 20px 0;">

    <h1>AJAX: demonstrate GET and POST</h1>
    <h2>Method: POST an email to database</h2>
<input type="email" id="email">
<p id="message"></p>
<button onclick="saveEmail()">Save Email To Database</button>
<hr style="border: 1px solid black; width: 100%; margin: 20px 0;">

 <h2>Method: GET an email from database</h2>
<input type="email" id="emailcheck">
<p id="m"></p>
<button onclick="checkEmail()">Get Email From The Database</button>
<hr style="border: 1px solid black; width: 100%; margin: 20px 0;">



<script>

    let isOpen = false;
    function loadText() { 
        isOpen = !isOpen;    
    const btn = document.getElementById("toggleBtn");
    if (isOpen) {
        btn.innerText = "Close Text";
        var xhttp = new XMLHttpRequest(); 
        xhttp.onload = function() { document.getElementById("demo").innerHTML 
        = this.responseText; }; 
        xhttp.open("GET", "ajax_info.txt", true);
        xhttp.send(); 
    } else {
        btn.innerText = "Load Text";
        document.getElementById("demo").innerHTML = "";
    }
}


        
function saveEmail() {
    const email = document.getElementById("email").value;

    const formData = new FormData();
    formData.append("email", email);

    fetch("store.php", {
        method: "POST",
        body: formData
    })
    .then(r => r.text())
    .then(data => {
        document.getElementById("message").innerHTML = data;
        loadEmails();
    })
     .catch(err => {
        console.error("Save error:", err);
    });
}

function checkEmail() {
    const emailcheck = document.getElementById("emailcheck").value;
    const m = document.getElementById("m");
    m.innerHTML = "Checking...";
    const formData = new FormData();
    formData.append("emailcheck", emailcheck);

    fetch("check.php", {
        method: "POST",
        body: formData
    })
    .then(r => r.text())
    .then(data => {
        m.innerHTML = data;
    });
}

loadEmails();
</script>

</body>
</html>
