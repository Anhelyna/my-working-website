<!DOCTYPE html>
<html>
<head>
    <title>Email Store</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="header">
        <img src="./download.jpg" alt="Profile Photo" />
        <div class="name">Anhelyna Kikena</div>
    </div>

    <div class="title-box">
        <h1>AJAX PAGE</h1>
            </div>

    <div class="links">
    <ul>
      <li><a href="./index.html" target="_blank">Go Back To My Home Page</a></li>
    <li><a href="./COSCLAB.html" target="_blank">Go Back To My COSC Lab Page</a></li>
</ul>
    </div>
    <h1>AJAX: demonstrate AJAX - The XMLHttpRequest Object</h1>
    <h2><p id="demo">AJAX response from the server</p></h2> 
    <button type="button" onclick="loadText()">Load Text</button> 
    <p id="emailMsg"></p>
    


    <hr style="border: 2px solid black; width: 100%; margin: 20px 0;">

    <h1>AJAX: demonstrate GET and POST</h1>
    <h2>Method: POST an email to database</h2>
<input type="email" id="email">
<p id="message"></p>
<button onclick="saveEmail()">Save Email To Database</button>
<hr style="border: 1px solid black; width: 100%; margin: 20px 0;">

 <h2>Method: GET an email from database</h2>
<input type="email" id="email">
<p id="m"></p>
<button onclick="checkEmail()">Get Email From The Database</button>
<hr style="border: 1px solid black; width: 100%; margin: 20px 0;">



<script>

    function loadText() { 
        var xhttp = new XMLHttpRequest(); 
        xhttp.onload = function() { document.getElementById("demo").innerHTML 
        = this.responseText; }; 
        xhttp.open("GET", "ajax_info.txt", true);
        xhttp.send(); } 
        
function saveEmail() {
    const email = document.getElementById("email").value;

    const formData = new FormData();
    formData.append("email", email);

    fetch("store.php", {
        method: "POST",
        body: formData
    })
    .then(r => r.text())
    .then(data => {
        document.getElementById("message").innerHTML = data;
        loadEmails();
    });
}

function checkEmail() {
    const email = document.getElementById("email").value;
    const m = document.getElementById("m");
    m.innerHTML = "Checking...";
    const formData = new FormData();
    formData.append("email", email);

    fetch("check.php", {
        method: "POST",
        body: formData
    })
    .then(r => r.text())
    .then(data => {
        m.innerHTML = data;
    });
}

loadEmails();
</script>

</body>
</html>
